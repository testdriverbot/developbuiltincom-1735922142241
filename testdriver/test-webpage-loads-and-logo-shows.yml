version: 4.1.32
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Verify the webpage loads.
    commands:
      - command: hover-text
        text: Latest Tech Jobs Personalized For You.
        description: main headline on the webpage
        action: hover
  - prompt: >-
      Assert that the logo is visible.  # Use the content of the file from the
      environment
    commands:
      - command: hover-text
        text: built in
        description: company logo in the top left corner
        action: hover
      - command: assert
        expect: the logo is visible
