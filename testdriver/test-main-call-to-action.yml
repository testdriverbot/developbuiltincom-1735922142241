version: 4.1.32
steps:
  - prompt: Focus the browser window.
    commands: []
  - prompt: Locate the "SEE JOBS" button.
    commands:
      - command: hover-text
        text: SEE JOBS
        description: button to view available jobs
        action: hover
  - prompt: Click the "SEE JOBS" button.
    commands:
      - command: hover-text
        text: SEE JOBS
        description: button to view available jobs
        action: click
  - prompt: >-
      Assert that the job list page is displayed.  # Use the content of the file
      from the environment
    commands:
      - command: assert
        expect: Top Jobs For Your Search is visible
