version: 4.1.32
steps:
  - prompt: Focus the browser window.
    commands:
      - command: focus-application
        name: Google Chrome
  - prompt: Click on the "Job Title or Keyword" input field.
    commands:
      - command: hover-text
        text: Job Title or Keyword
        description: input field for job search
        action: click
  - prompt: 'Type in a job title  # Use the content of the file from the environment'
    commands:
      - command: type
        text: Software Engineer
  - prompt: 'Type in a job title  # Use the content of the file from the environment'
    commands:
      - command: type
        text: Software Engineer
